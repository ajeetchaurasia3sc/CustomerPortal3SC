# ====================== Application ======================
spring.application.name=customerportal

# ====================== PostgreSQL ======================
spring.datasource.url=jdbc:postgresql://localhost:5432/customer_portal
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ====================== JPA / Hibernate ======================
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ====================== File Upload ======================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB

# ====================== Spring AI — OpenAI ======================
# Set OPENAI_API_KEY as an environment variable in production.
# To switch provider, replace this block with spring.ai.anthropic.* or spring.ai.ollama.*
spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
spring.ai.openai.chat.options.model=gpt-4o-mini

# ====================== Server ======================
server.port=8080

# ====================== JWT ======================
# IMPORTANT: replace this secret in production with a 64+ char random string
jwt.secret=mySuperLongSecretKeyForCustomerPortalAPI2026MakeItAtLeast64CharactersLongAndChangeInProduction
jwt.access-expiration=3600000
jwt.refresh-expiration=604800000

# ====================== Logging ======================
logging.level.root=INFO
logging.level.com.sssupply.customerportal=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=ERROR
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.orm.deprecation=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR
logging.level.org.springframework.boot.context.properties=ERROR

spring.output.ansi.enabled=ALWAYS
spring.main.banner-mode=console
spring.devtools.restart.log-condition-evaluation-delta=false

# ====================== Swagger / OpenAPI ======================
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.layout=BaseLayout
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
